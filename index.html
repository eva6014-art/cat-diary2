<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>💳 信用卡回饋</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4ff;font-family:'Noto Sans TC',sans-serif}
button{font-family:inherit;cursor:pointer}input,select{font-family:inherit}
button:active{transform:scale(.97)}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.up{animation:up .25s ease forwards}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
#hdr{background:linear-gradient(135deg,#7c6cfc,#38b6ff);padding:20px 16px 16px;position:relative;overflow:hidden}
#hdr::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.12);pointer-events:none}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.mbtn{background:rgba(255,255,255,.2);border:none;color:white;width:28px;height:28px;border-radius:8px;font-size:17px}
#mlbl{font-size:14px;font-weight:700;color:white;flex:1}
.stats{display:flex}.st{flex:1;text-align:center}
.sv{font-size:19px;font-weight:900;color:white}.sl2{font-size:10px;color:rgba(255,255,255,.7);margin-top:2px}
#sind{text-align:right;margin-top:8px;min-height:14px;font-size:11px}
#nav{display:flex;background:white;border-bottom:1px solid #d0d8ff;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px #7c6cfc15}
.nb{flex:1;padding:11px 0 9px;background:none;border:none;border-bottom:2.5px solid transparent;color:#8b93c8;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;transition:color .15s}
.nb.on{color:#7c6cfc;border-bottom-color:#7c6cfc;font-weight:700}
.ni{font-size:17px}
#ct{flex:1;padding:14px 12px 40px}
.sec{font-size:11px;font-weight:700;letter-spacing:2px;color:#8b93c8;text-transform:uppercase;margin-bottom:8px}
.sec.mt{margin-top:18px}
.card{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 10px #7c6cfc15;border:1px solid #d0d8ff;opacity:0}
.bdg{display:inline-flex;align-items:center;border-radius:16px;font-size:11px;font-weight:700;padding:3px 12px;border:1px solid}
.bsm{font-size:10px;padding:2px 8px}
.fi{width:100%;background:white;border:1.5px solid #d0d8ff;border-radius:10px;padding:11px 12px;color:#1e1b4b;font-size:14px;outline:none}
.fi:focus{border-color:#7c6cfc;box-shadow:0 0 0 3px #7c6cfc20}
.si{width:100%;background:white;border:1.5px solid #d0d8ff;border-radius:9px;padding:9px 11px;color:#1e1b4b;font-size:13px;outline:none}
.si:focus{border-color:#7c6cfc}
.chip{padding:6px 12px;border-radius:18px;border:1.5px solid #d0d8ff;background:white;color:#4b5080;font-size:12px;transition:all .15s}
.chip.on{background:#7c6cfc;border-color:#7c6cfc;color:white;font-weight:700}
.cr{display:flex;flex-wrap:wrap;gap:5px}
.sbtn{background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;color:white;border-radius:12px;padding:14px;font-size:14px;font-weight:800;width:100%;letter-spacing:2px}
.abtn{background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:9px;padding:7px 14px;color:white;font-size:12px;font-weight:700}
.csel{width:100%;display:flex;justify-content:space-between;align-items:center;padding:11px 12px;border-radius:12px;border:1.5px solid #d0d8ff;background:white;text-align:left;margin-bottom:7px;transition:all .15s}
.ri{display:flex;align-items:center;gap:10px;background:white;border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 2px 10px #7c6cfc15;border-left:4px solid}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:900;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
.sh{background:#f0f4ff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 -6px 30px #7c6cfc20}
.shh{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid #d0d8ff}
.sht{font-size:16px;font-weight:800;color:#1e1b4b}
.shc{background:#e8eeff;border:none;color:#4b5080;width:26px;height:26px;border-radius:7px;font-size:15px}
.shb{flex:1;overflow-y:auto;padding:12px 16px 8px}
.shf{display:flex;gap:8px;padding:10px 16px 20px;border-top:1px solid #d0d8ff}
.cancbtn{flex:1;background:#e8eeff;border:none;border-radius:10px;padding:12px 0;color:#4b5080;font-size:13px;font-weight:700}
.savbtn{flex:2;background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:10px;padding:12px 0;color:white;font-size:13px;font-weight:800}
.delbtn{background:white;border:1.5px solid rgba(244,63,94,.35);border-radius:10px;padding:12px 12px;color:#f43f5e;font-size:12px;font-weight:700}
.tc{background:#f8f9ff;border:1px solid #e0e6ff;border-radius:10px;padding:11px 12px;margin-bottom:8px}
.tlbl{font-size:10px;color:#8b93c8;display:block;margin-bottom:3px}
.tinp{width:100%;background:white;border:1px solid #d0d8ff;border-radius:7px;padding:7px 10px;font-size:13px;color:#1e1b4b;outline:none}
.tpb{height:5px;background:#e8eeff;border-radius:3px;overflow:hidden;margin:4px 0}
.tpf{height:100%;border-radius:3px;transition:width .5s}
.conf{background:white;border-radius:18px;padding:24px;width:290px;box-shadow:0 6px 30px rgba(0,0,0,.12)}
.empty{text-align:center;color:#8b93c8;padding:50px 20px;line-height:2}
.gbtn{margin-top:14px;background:linear-gradient(135deg,#7c6cfc,#38b6ff);border:none;border-radius:10px;padding:9px 20px;color:white;font-size:13px;font-weight:700}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;color:white;z-index:3000;white-space:nowrap;display:none;animation:up .2s ease;box-shadow:0 3px 15px rgba(0,0,0,.15)}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div class="mrow"><button class="mbtn" id="pm">&#8249;</button><span id="mlbl"></span><button class="mbtn" id="nm">&#8250;</button></div>
  <div class="stats">
    <div class="st"><div class="sv" id="hs">$0</div><div class="sl2">本月消費</div></div>
    <div class="st"><div class="sv" id="hr">$0</div><div class="sl2">累積回饋</div></div>
    <div class="st"><div class="sv" id="hc">0</div><div class="sl2">消費筆數</div></div>
  </div>
  <div id="sind"></div>
</div>
<nav id="nav">
  <button class="nb on" data-v="home"><span class="ni">▦</span>總覽</button>
  <button class="nb" data-v="add"><span class="ni">⊕</span>記帳</button>
  <button class="nb" data-v="hist"><span class="ni">≡</span>紀錄</button>
  <button class="nb" data-v="mgmt"><span class="ni">◈</span>管理</button>
</nav>
<div id="ct"></div>
</div>
<div id="toast"></div>
<script>
var C={p:'#7c6cfc',a:'#38b6ff',t:'#1e1b4b',t2:'#4b5080',t3:'#8b93c8',d:'#f43f5e',w:'#f59e0b',ok:'#10b981',bg:'#f0f4ff',b:'#d0d8ff'};
var TC=['#38b6ff','#f59e0b','#10b981','#f472b6','#7c6cfc'];
// 卡片預設顏色組合
var CSETS=[
  {c:'#1e3a5f',a:'#38b6ff'},{c:'#2d1b69',a:'#7c6cfc'},{c:'#5b0e2d',a:'#f472b6'},
  {c:'#064e3b',a:'#34d399'},{c:'#1e1b4b',a:'#fbbf24'},{c:'#0c4a6e',a:'#60a5fa'}
];
var CATS=[
  {id:'dining',e:'🍜',n:'餐飲',ch:['all','dining'],bi:true},
  {id:'online',e:'💻',n:'網購',ch:['all','online'],bi:true},
  {id:'transport',e:'🚇',n:'交通',ch:['all'],bi:true},
  {id:'grocery',e:'🛒',n:'超市',ch:['all','supermarket'],bi:true},
  {id:'linepay',e:'📱',n:'LINE Pay',ch:['all','linepay'],bi:true},
  {id:'jkopay',e:'🏪',n:'街口',ch:['all','jkopay'],bi:true},
  {id:'sport',e:'🏋️',n:'運動',ch:['all','sport'],bi:true},
  {id:'other',e:'📦',n:'其他',ch:['all'],bi:true}
];
var CHOPTS=[{id:'all',l:'所有通路'},{id:'online',l:'網路消費'},{id:'linepay',l:'LINE Pay'},{id:'jkopay',l:'街口支付'},{id:'supermarket',l:'超市/量販'},{id:'dining',l:'餐飲'},{id:'sport',l:'運動相關'}];
var CYOPTS=[{id:'monthly',l:'每月'},{id:'quarterly',l:'每季'},{id:'yearly',l:'每年'}];
var DCARDS=[
  {id:'fen',n:'永豐大戶卡',bk:'永豐銀行',c:'#1e3a5f',a:'#38b6ff',cy:'monthly',rd:1,ch:['all'],cl:'所有通路',note:'',
    tiers:[{id:'t1',n:'基本回饋',r:1,cap:0,ms:0,ch:['all']},{id:'t2',n:'運動獎勵',r:1,cap:50,ms:5000,ch:['sport']},{id:'t3',n:'指定支付',r:3,cap:300,ms:10000,ch:['linepay','jkopay']}]},
  {id:'lp',n:'LINE Pay 卡',bk:'中國信託',c:'#2d1b69',a:'#7c6cfc',cy:'monthly',rd:1,ch:['linepay'],cl:'LINE Pay',note:'',
    tiers:[{id:'t1',n:'基本回饋',r:3,cap:500,ms:0,ch:['all']}]},
  {id:'jko',n:'街口聯名卡',bk:'第一銀行',c:'#5b0e2d',a:'#f472b6',cy:'monthly',rd:1,ch:['jkopay'],cl:'街口支付',note:'',
    tiers:[{id:'t1',n:'基本回饋',r:2,cap:300,ms:0,ch:['all']}]}
];
var K={ca:'ctv9ca',re:'ctv9re',ls:'ctv9ls'};
function lg(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function nm(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function td(){return new Date().toISOString().slice(0,10);}
function uid(){return Math.random().toString(36).slice(2,8);}
function $$(n){return '$'+Math.round(n).toLocaleString('zh-TW');}
function fdate(d){var x=new Date(d);return(x.getMonth()+1)+'/'+x.getDate();}
function ftime(d){if(!d)return'';var x=new Date(d);return String(x.getHours()).padStart(2,'0')+':'+String(x.getMinutes()).padStart(2,'0');}
function esc(s){return s?(s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function getSmp(){var m=nm();return[
  {id:1,cid:'fen',amt:3200,cat:'online',note:'momo購物',dt:m+'-05'},
  {id:2,cid:'fen',amt:5500,cat:'dining',note:'家族聚餐',dt:m+'-10'},
  {id:3,cid:'lp',amt:420,cat:'linepay',note:'LINE Pay早午餐',dt:m+'-12'},
  {id:4,cid:'jko',amt:1280,cat:'grocery',note:'好市多',dt:m+'-14'},
  {id:5,cid:'fen',amt:6000,cat:'linepay',note:'LINE Pay購物',dt:m+'-16'},
  {id:6,cid:'fen',amt:1800,cat:'other',note:'加油',dt:m+'-18'}
];}
var S={cards:lg(K.ca,DCARDS),recs:lg(K.re,getSmp()),view:'home',month:nm(),form:{cid:'',amt:'',cat:'dining',note:'',dt:td()}};
if(S.cards.length&&!S.form.cid)S.form.cid=S.cards[0].id;
function fix(card){
  if(!card.tiers||!card.tiers.length)card.tiers=[{id:'t1',n:'基本回饋',r:card.rate||1,cap:card.cap||0,ms:0,ch:['all']}];
  card.tiers.forEach(function(t){if(!t.ch||!t.ch.length)t.ch=['all'];if(!t.id)t.id=uid();});
  if(!card.ch||!card.ch.length)card.ch=['all'];
  if(!card.cl)card.cl='所有通路';
}
function calcT(tier,spent,catId){
  var cat=CATS.find(function(c){return c.id===catId;});
  var ch=tier.ch&&tier.ch.length?tier.ch:['all'];
  var ok=ch.indexOf('all')>=0||(cat&&cat.ch.some(function(x){return ch.indexOf(x)>=0;}));
  if(!ok)return{rw:0,prog:0,rem:0,rl:0,ok:false,active:false};
  var raw=spent*(tier.r/100),rw=tier.cap>0?Math.min(raw,tier.cap):raw;
  var ms=tier.ms||0;
  if(ms>0){var p=Math.min(spent/ms,1);return{rw:rw,prog:p,rem:Math.max(ms-spent,0),rl:tier.cap>0?Math.max(tier.cap-rw,0):0,ok:true,active:spent>=ms};}
  var mx=tier.cap>0?tier.cap/(tier.r/100):0,p2=mx>0?Math.min(spent/mx,1):1;
  return{rw:rw,prog:p2,rem:mx>0?Math.max(mx-spent,0):0,rl:tier.cap>0?Math.max(tier.cap-rw,0):0,ok:true,active:true};
}
function cstat(card){
  fix(card);
  var r=S.recs.filter(function(x){return x.cid===card.id&&x.dt.startsWith(S.month);});
  var sp=r.reduce(function(s,x){return s+x.amt;},0),rw=0;
  var ts=card.tiers.map(function(t){var x=calcT(t,sp,t.ch[0]||'all');rw+=x.rw;return x;});
  return{sp:sp,rw:rw,ts:ts,r:r};
}
function rank(amt,catId){
  return S.cards.map(function(card){
    fix(card);var st=cstat(card);
    var nrw=card.tiers.reduce(function(s,t){return s+calcT(t,st.sp+amt,catId).rw;},0);
    var tr=Math.max(nrw-st.rw,0);
    return{card:card,tr:tr,reason:tr>0?'可獲 '+$$(tr):'$0'};
  }).sort(function(a,b){return b.tr-a.tr;});
}
var svt,svs='idle';
function save(){svs='saving';rsi();clearTimeout(svt);svt=setTimeout(function(){lset(K.ca,S.cards);lset(K.re,S.recs);localStorage.setItem(K.ls,new Date().toISOString());svs='saved';rsi();setTimeout(function(){svs='idle';rsi();},2000);},800);}
function rsi(){var el=document.getElementById('sind');if(!el)return;if(svs==='saving')el.innerHTML='<span style="font-size:10px;color:rgba(255,255,255,.7)">儲存中…</span>';else if(svs==='saved')el.innerHTML='<span style="font-size:10px;color:#84ffda">✓ 已存檔</span>';else{var t=localStorage.getItem(K.ls);el.innerHTML=t?'<span style="font-size:10px;color:rgba(255,255,255,.6)">'+ftime(new Date(t))+' 存檔</span>':'';};}
var tt;function toast(m,tp){tp=tp||'ok';var el=document.getElementById('toast');el.textContent=m;el.style.background=tp==='err'?C.d:tp==='warn'?C.w:C.ok;el.style.display='block';clearTimeout(tt);tt=setTimeout(function(){el.style.display='none';},2500);}
function ring(prog,sz,col){var s=5,r=(sz-s)/2,ci=2*Math.PI*r,co=prog>=1?C.d:prog>.8?C.w:col,off=ci*(1-Math.min(prog,1));return'<svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+C.bg+'" stroke-width="'+s+'"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+co+'" stroke-width="'+s+'" stroke-dasharray="'+ci+'" stroke-dashoffset="'+off+'" stroke-linecap="round" style="transition:stroke-dashoffset .5s"/></svg>';}
function bdg(card,sm){return'<span class="bdg'+(sm?' bsm':'')+'" style="background:'+card.c+';color:'+card.a+';border-color:'+card.a+'55">'+card.n+'</span>';}
function rh(){var p=S.month.split('-');document.getElementById('mlbl').textContent=p[0]+' 年 '+parseInt(p[1])+' 月';var r=S.recs.filter(function(x){return x.dt.startsWith(S.month);});document.getElementById('hs').textContent=$$(r.reduce(function(s,x){return s+x.amt;},0));document.getElementById('hr').textContent=$$(S.cards.reduce(function(s,c){fix(c);return s+cstat(c).rw;},0));document.getElementById('hc').textContent=r.length;document.getElementById('nm').disabled=S.month>=nm();rsi();}
function vHome(){
  var r=S.recs.filter(function(x){return x.dt.startsWith(S.month);});
  if(!S.cards.length)return'<div class="empty"><div style="font-size:36px">💳</div><div style="font-weight:700;margin-top:8px">還沒有信用卡</div><button class="gbtn" onclick="sv(\'mgmt\')">前往新增</button></div>';
  var h='<div class="sec">信用卡回饋進度</div>';
  S.cards.forEach(function(card,i){
    fix(card);var st=cstat(card);
    var tc=card.tiers.reduce(function(s,t){return s+(+t.cap||0);},0);
    var tp=tc>0?Math.min(st.rw/tc,1):0;
    var rds=+card.rd>=31?'月底':card.rd+'號';
    h+='<div class="card up" style="animation-delay:'+i*.06+'s">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px"><div>'+bdg(card)+'<div style="font-size:10px;color:'+C.t3+';margin-top:5px">'+card.cl+' · 每月'+rds+'重置</div></div>';
    h+='<div style="position:relative">'+ring(tp,58,card.a)+'<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:10px;font-weight:700;color:'+card.a+'">'+$$(st.rw)+'</div><div style="font-size:9px;color:'+C.t3+'">回饋</div></div></div></div>';
    card.tiers.forEach(function(tier,ti){
      var ts=st.ts[ti],tc2=TC[ti%TC.length],pp=Math.min(ts.prog*100,100),over=ts.prog>=1;
      h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><div style="display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+tc2+'"></span><span style="font-size:11px;font-weight:700;color:'+C.t2+'">'+esc(tier.n)+'</span><span style="font-size:10px;color:'+tc2+'">'+tier.r+'%</span></div><span style="font-size:11px;color:'+C.t3+'">';
      if(!ts.ok)h+='通路不符';
      else if(tier.ms>0&&!ts.active)h+='再刷'+$$(ts.rem)+'達門檻';
      else h+=$$(ts.rw)+(tier.cap>0?' / '+$$(tier.cap):'（無上限）');
      h+='</span></div><div class="tpb"><div class="tpf" style="width:'+(ts.ok?pp:0)+'%;background:'+(over?C.d:ts.active?tc2:tc2+'55')+'"></div></div>';
      if(ts.ok&&over)h+='<div style="font-size:10px;color:'+C.d+';text-align:right">⚠ 已達上限</div>';
      else if(ts.ok&&tier.ms>0&&!ts.active)h+='<div style="font-size:10px;color:'+C.t3+';text-align:right">達標後最多 '+$$(tier.cap||0)+'</div>';
      h+='</div>';
    });
    h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:'+C.t3+';padding-top:8px;border-top:1px solid '+C.b+';margin-top:4px"><span>本月已刷 '+$$(st.sp)+'</span><span>'+st.r.length+' 筆</span></div></div>';
  });
  var cb=CATS.map(function(c){return{e:c.e,n:c.n,tot:r.filter(function(x){return x.cat===c.id;}).reduce(function(s,x){return s+x.amt;},0)};}).filter(function(c){return c.tot>0;}).sort(function(a,b){return b.tot-a.tot;});
  if(cb.length){h+='<div class="sec mt">消費類別</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">';cb.forEach(function(c){h+='<div style="background:white;border-radius:12px;padding:12px 6px;text-align:center;box-shadow:0 2px 8px #7c6cfc12;border:1px solid '+C.b+'"><div style="font-size:20px">'+c.e+'</div><div style="font-size:10px;color:'+C.t3+';margin:3px 0">'+c.n+'</div><div style="font-size:12px;font-weight:700;color:'+C.t+'">'+$$(c.tot)+'</div></div>';});h+='</div>';}
  return h;
}
function vAdd(){
  if(!S.cards.length)return'<div class="empty">請先新增信用卡<br><button class="gbtn" onclick="sv(\'mgmt\')">前往新增</button></div>';
  var amt=parseFloat(S.form.amt)||0,rk=amt>0?rank(amt,S.form.cat):[],best=rk[0];
  var h='<div class="sec">新增消費紀錄</div><div id="rec-banner">';

    ov.remove();save();toast('卡片已儲存 ✓');render();
  };
  window.ce_del=function(id){S.cards=S.cards.filter(function(c){return c.id!==id;});S.recs=S.recs.filter(function(r){return r.cid!==id;});ov.remove();save();toast('卡片已刪除','warn');render();};
  document.body.appendChild(ov);bld();
}
try{render();}catch(e){console.error(e);}save();
</script>
